# ==============================
# Chroma 向量数据库配置
# ==============================

# 向量数据库持久化目录
# 基于项目根目录的相对路径
persist_directory: chroma_db

# 向量集合名称（类似数据库中的 table）
collection_name: agent


# ==============================
# 向量检索配置
# ==============================

# 检索返回的相似向量数量（Top-K）
k: 3


# ==============================
# 知识库数据配置
# ==============================

# 知识文件存储目录（相对项目根目录）
data_path: data

# 允许导入知识库的文件类型
allow_knowledge_file_type:
  - ".txt"
  - ".pdf"

# 已导入文件的 MD5 记录文件
# 用于避免重复加载同一文件
md5_hex_store: md5.txt


# ==============================
# 文本切分配置
# ==============================

# 文本分块大小
chunk_size: 200

# 分块重叠长度
# 防止语义在切分时被截断
chunk_overlap: 20

# 文本分割优先级（从高到低）
# 优先按照段落 -> 换行 -> 句号 等进行切分
separators:
  - "\n\n"
  - "\n"
  - ". "
  - "! "
  - "? "
  - ""